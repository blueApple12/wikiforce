<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Word Force</title>
    <style>
        :root { --accent: #007AFF; --bg: #000; }
        * { box-sizing: border-box; }
        body {
            background: var(--bg);
            color: #fff;
            font-family: -apple-system, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            padding: 60px 20px;
        }
        h1 {
            font-weight: 200;
            letter-spacing: 4px;
            font-size: 1.1rem;
            margin-bottom: 40px;
            color: #888;
        }
        .setup-zone {
            margin-bottom: 20px;
            text-align: center;
            width: 280px;
        }
        label {
            display: block;
            font-size: 0.65rem;
            text-transform: uppercase;
            color: #444;
            margin-bottom: 20px;
            letter-spacing: 2px;
        }
        .word-row {
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 14px;
            gap: 10px;
        }
        input[type=text] {
            background: transparent;
            border: none;
            border-bottom: 2px solid #333;
            color: var(--accent);
            font-size: 2.8rem;
            text-align: center;
            width: 220px;
            padding: 8px 4px;
            font-weight: 200;
            outline: none;
            transition: border-color 0.3s;
            letter-spacing: 3px;
        }
        input[type=text]:focus { border-bottom-color: var(--accent); }
        input[type=text]::placeholder { color: #222; }
        .remove-btn {
            background: none;
            border: none;
            color: #333;
            font-size: 1.4rem;
            cursor: pointer;
            padding: 0;
            line-height: 1;
            transition: color 0.2s;
            flex-shrink: 0;
        }
        .remove-btn:hover { color: #666; }
        .add-btn {
            background: none;
            border: 1px solid #222;
            color: #444;
            padding: 12px 0;
            border-radius: 12px;
            font-size: 0.7rem;
            letter-spacing: 2px;
            cursor: pointer;
            width: 280px;
            margin-bottom: 30px;
            text-transform: uppercase;
            transition: border-color 0.2s, color 0.2s;
        }
        .add-btn:hover { border-color: #444; color: #777; }
        .btn {
            background: #fff;
            color: #000;
            padding: 20px;
            border-radius: 18px;
            font-size: 0.9rem;
            font-weight: 700;
            border: none;
            cursor: pointer;
            width: 280px;
            letter-spacing: 1px;
            transition: opacity 0.2s;
        }
        .btn:active { opacity: 0.8; }
        #confirm {
            margin-top: 25px;
            font-size: 0.7rem;
            color: var(--accent);
            font-weight: 600;
            text-transform: uppercase;
            opacity: 0;
            transition: opacity 0.3s;
            letter-spacing: 2px;
        }
    </style>
</head>
<body>

    <h1>WORD FORCE</h1>

    <div class="setup-zone">
        <label>Force Words</label>
        <div id="wordList"></div>
    </div>

    <button class="add-btn" onclick="addWord()">+ ADD WORD</button>
    <button class="btn" onclick="engage()">ENGAGE PROTOCOL</button>
    <div id="confirm">System Armed</div>

    <script>
        const confirmMsg = document.getElementById('confirm');
        const wordList = document.getElementById('wordList');

        function makeRow(value, removable) {
            const row = document.createElement('div');
            row.className = 'word-row';
            const inp = document.createElement('input');
            inp.type = 'text';
            inp.placeholder = 'WORD';
            inp.maxLength = 30;
            inp.autocomplete = 'off';
            inp.spellcheck = false;
            inp.value = value || '';
            row.appendChild(inp);
            if (removable) {
                const btn = document.createElement('button');
                btn.className = 'remove-btn';
                btn.textContent = '\u00d7';
                btn.onclick = () => row.remove();
                row.appendChild(btn);
            }
            return row;
        }

        const saved = localStorage.getItem('wf-words');
        let initialWords = [];
        if (saved) { try { initialWords = JSON.parse(saved); } catch(e) {} }
        if (initialWords.length === 0) initialWords = [''];
        initialWords.forEach((w, i) => wordList.appendChild(makeRow(w, i > 0)));

        function addWord() {
            wordList.appendChild(makeRow('', true));
            wordList.lastElementChild.querySelector('input').focus();
        }

        function engage() {
            const inputs = wordList.querySelectorAll('input[type=text]');
            const words = Array.from(inputs).map(i => i.value.trim()).filter(w => w.length > 0);
            if (words.length === 0) { alert("Please enter at least one force word."); return; }
            localStorage.setItem('wf-words', JSON.stringify(words));

            const wordsJSON = JSON.stringify(words);

            // Build the bookmarklet payload
            const payload = `javascript:(function(){var fw=${wordsJSON};var enfl=['way','day','man','war','law','age','act','end','aim','use','job','eye','art','run','cut','aid','key','air','sea','old','new','big','far','own','say','form','door','room','hand','face','rule','name','side','head','part','team','role','unit','view','real','long','high','wide','deep','fast','hard','dark','free','true','full','huge','open','move','hold','play','work','kind','good','best','last','next','said','gave','feel','call','hear','knew','took','came','went','find','live','tell','keep','put','set','lead','meet'];var hefl=['\u05E9\u05DC','\u05E2\u05DD','\u05D0\u05DC','\u05DB\u05D9','\u05DC\u05D0','\u05E8\u05E7','\u05DB\u05DF','\u05D2\u05DD','\u05D0\u05DD','\u05E2\u05D3','\u05D1\u05D9\u05DF','\u05E2\u05D5\u05D3','\u05D0\u05DA','\u05DB\u05DC','\u05DE\u05D4','\u05D6\u05D4','\u05D4\u05DD','\u05D4\u05D9\u05D4','\u05D9\u05E9','\u05DB\u05DA','\u05D0\u05D6','\u05E9\u05DD','\u05DC\u05D5','\u05DC\u05D4','\u05D1\u05D5','\u05D1\u05D4','\u05E2\u05DC','\u05DE\u05DF','\u05D0\u05EA','\u05D0\u05D7\u05E8','\u05E8\u05D0\u05E9','\u05D9\u05D3','\u05E2\u05D9\u05DF','\u05D1\u05D9\u05EA','\u05D9\u05D5\u05DD','\u05DC\u05D1','\u05E4\u05D4','\u05D0\u05E0\u05D5','\u05D0\u05E0\u05D9','\u05D4\u05D5\u05D0','\u05D4\u05D9\u05D0','\u05D4\u05DF','\u05E2\u05DD'];var lang=document.documentElement.lang||'';var isHe=lang.indexOf('he')===0||window.location.hostname.indexOf('he.')===0;var fl=isHe?hefl:enfl;function mc(o,w){if(isHe)return w;if(o===o.toUpperCase()&&o.length>1)return w.toUpperCase();if(o[0]===o[0].toUpperCase())return w[0].toUpperCase()+w.slice(1).toLowerCase();return w.toLowerCase();}var art=document.querySelector('#mw-content-text')||document.body;var wk=document.createTreeWalker(art,NodeFilter.SHOW_TEXT,null,false);var nd=[],n;while(n=wk.nextNode()){var p=n.parentElement;if(p&&['SCRIPT','STYLE','MATH','SUP','NOSCRIPT'].indexOf(p.tagName)<0&&n.textContent.trim())nd.push(n);}var tot=0;var nt=nd.map(function(node){var tk,li=[];if(isHe){tk=node.textContent.split(/([\u05D0-\u05EA\u05F0-\u05F4]+)/);tk.forEach(function(t,i){if(i%2===1&&t.length>=4){li.push(i);tot++;}});}else{tk=node.textContent.split(/\\b/);tk.forEach(function(t,i){if(/^[a-zA-Z]{6,}$/.test(t)){li.push(i);tot++;}});}return{node:node,tk:tk,li:li};});var interval=50;var fps=[];var pos=Math.floor(interval/2+(Math.random()*20-10));while(pos<tot){fps.push(pos);pos+=interval+Math.floor(Math.random()*20-10);}var fset={};fps.forEach(function(p){fset[p]=true;});var fwi=0,gi=0;nt.forEach(function(d){d.li.forEach(function(idx){if(fset[gi]){d.tk[idx]=mc(d.tk[idx],fw[fwi%fw.length]);fwi++;}else{d.tk[idx]=mc(d.tk[idx],fl[Math.floor(Math.random()*fl.length)]);}gi++;});d.node.textContent=d.tk.join('');});})();`;

            navigator.clipboard.writeText(payload).then(() => {
                confirmMsg.style.opacity = '1';
                setTimeout(() => window.location.replace("https://en.wikipedia.org/"), 800);
            }).catch(() => prompt("Copy this bookmarklet:", payload));
        }
    </script>
</body>
</html>
